<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NN可視化</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0f1115;
        color: #d6d9df;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
      }

      #title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.2;
      }

      #subtitle {
        margin-top: 3px;
        font-size: 12px;
        opacity: 0.85;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 70vw;
      }

      #status {
        font-size: 12px;
        opacity: 0.9;
        text-align: right;
        line-height: 1.3;
        white-space: pre;
      }

      #nn-canvas {
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div id="title">NN可視化</div>
        <div id="subtitle">マクロ画面で個体をクリックしてください</div>
      </div>
      <div id="status">-</div>
    </header>

    <canvas id="nn-canvas"></canvas>

    <script type="module" src="./nn_viz.js"></script>
  </body>
</html>
