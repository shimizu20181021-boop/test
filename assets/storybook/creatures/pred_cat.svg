<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Storybook predator (side view). Ground line is y=112. -->
  <style>
    .outline { stroke: var(--outline, #1f140b); stroke-width: 5.6; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .outlineThin { stroke: var(--outline, #1f140b); stroke-width: 3.0; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .coat1 { fill: var(--coat1, #caa06a); }
    .coat2 { fill: var(--coat2, #9b6a3a); }
    .coat3 { fill: var(--coat3, #6b3b1a); }
    .muzzle { fill: var(--muzzle, #e7caa2); }
    .spot { fill: var(--spot, #5b2b2b); opacity: 0.26; }
    .eye { fill: var(--eye, #120c07); }
    .shine { fill: rgba(255,255,255,0.86); }
    .detail { fill: none; stroke: var(--outline, #1f140b); stroke-width: 2.8; opacity: 0.32; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .stripe { fill: none; stroke: var(--spot, #5b2b2b); stroke-width: 4.0; opacity: 0.34; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
  </style>

  <defs>
    <linearGradient id="gBody" gradientUnits="userSpaceOnUse" x1="28" y1="56" x2="118" y2="112">
      <stop offset="0" stop-color="var(--coat1, #caa06a)" />
      <stop offset="0.75" stop-color="var(--coat2, #9b6a3a)" />
      <stop offset="1" stop-color="var(--coat3, #6b3b1a)" />
    </linearGradient>
  </defs>

  <g id="cat_body">
    <path class="outline" fill="url(#gBody)" d="M38 90 C40 70 56 60 78 60 C100 60 112 72 110 90 C108 106 94 112 72 112 C52 112 36 106 38 90 Z" />
    <path class="stripe" d="M66 70 Q78 62 92 70" />
    <path class="stripe" d="M60 78 Q72 72 86 80" />
    <path class="stripe" d="M58 88 Q70 84 82 90" opacity="0.55" />
    <path class="detail" d="M56 94 Q74 104 92 94" />
  </g>

  <g id="cat_tail">
    <path class="outline coat2" d="M108 92 Q124 86 122 68 Q120 48 106 52" />
    <path class="outline coat3" d="M108 52 Q118 50 114 42 Q108 36 100 42 Q96 48 100 52 Q104 56 108 52 Z" />
    <path class="stripe" d="M110 74 Q114 72 118 74" />
    <path class="stripe" d="M110 66 Q114 64 118 66" />
    <path class="detail" d="M112 78 Q116 70 114 62" />
  </g>

  <g id="cat_legs">
    <g opacity="0.62">
      <path class="outline coat2" d="M58 90 Q60 88 62 90 V110 Q60 112 58 110 Z" />
      <path class="outline coat2" d="M90 92 Q92 90 94 92 V110 Q92 112 90 110 Z" />
      <path class="outline coat3" d="M56 109 H64 V112 H56 Z" />
      <path class="outline coat3" d="M88 109 H96 V112 H88 Z" />
    </g>
    <path class="outline coat2" d="M64 90 Q66 88 68 90 V110 Q66 112 64 110 Z" />
    <path class="outline coat2" d="M96 92 Q98 90 100 92 V110 Q98 112 96 110 Z" />
    <path class="outline coat3" d="M62 109 H70 V112 H62 Z" />
    <path class="outline coat3" d="M94 109 H102 V112 H94 Z" />
  </g>

  <g id="cat_neck">
    <path class="outline coat1" d="M50 70 Q40 74 40 86 Q46 90 50 86 Q52 78 60 74 Z" />
    <path class="detail" d="M44 76 Q42 82 46 86" />
  </g>

  <g id="cat_head_common">
    <!-- ears -->
    <path class="outline coat2" d="M30 60 L26 46 Q36 44 38 58 Z" />
    <path class="outline coat2" d="M40 60 L42 46 Q52 48 48 62 Z" />
    <!-- head -->
    <path class="outline coat1" d="M18 78 C18 62 30 56 42 58 C54 60 60 70 58 84 C56 96 44 102 32 98 C22 94 18 88 18 78 Z" />
    <!-- muzzle -->
    <path class="outline muzzle" d="M12 86 C12 80 18 76 26 76 C34 76 38 80 38 86 C38 92 34 96 26 96 C18 96 12 92 12 86 Z" />
    <circle class="eye" cx="40" cy="74" r="3.0" />
    <circle class="shine" cx="39" cy="73" r="1.1" />
    <circle class="eye" cx="22" cy="88" r="1.1" opacity="0.55" />
    <circle class="eye" cx="26" cy="88" r="1.1" opacity="0.55" />
    <path class="detail" d="M22 96 Q26 98 30 96" />
    <!-- whiskers -->
    <path class="detail" d="M30 88 Q36 86 42 88" opacity="0.6" />
    <path class="detail" d="M30 92 Q36 92 42 94" opacity="0.55" />
  </g>

  <g id="cat_brow_male">
    <path class="outlineThin" fill="none" opacity="0.85" d="M34 70 Q40 66 46 70" />
  </g>

  <g id="cat_lash_female">
    <path class="outlineThin" fill="none" opacity="0.62" d="M34 70 Q40 68 46 70" />
    <path class="outlineThin" fill="none" opacity="0.55" d="M44 70 Q48 68 52 70" />
  </g>

  <!-- stage groups -->
  <g id="male_adult">
    <use href="#cat_tail" />
    <use href="#cat_body" />
    <use href="#cat_legs" />
    <use href="#cat_neck" />
    <use href="#cat_head_common" />
    <use href="#cat_brow_male" />
  </g>
  <g id="male_young" style="display:none">
    <g transform="translate(76 88) scale(0.98) translate(-76 -88)"><use href="#cat_body" /></g>
    <g transform="translate(0 112) scale(1 0.93) translate(0 -112)"><use href="#cat_legs" /></g>
    <use href="#cat_tail" />
    <g transform="translate(38 80) scale(1.06) translate(-38 -80)">
      <use href="#cat_neck" />
      <use href="#cat_head_common" />
    </g>
    <use href="#cat_brow_male" />
  </g>
  <g id="male_child" style="display:none">
    <g transform="translate(76 90) scale(0.96) translate(-76 -90)"><use href="#cat_body" /></g>
    <g transform="translate(0 112) scale(1 0.86) translate(0 -112)"><use href="#cat_legs" /></g>
    <use href="#cat_tail" opacity="0.9" />
    <g transform="translate(38 80) scale(1.12) translate(-38 -80)">
      <use href="#cat_neck" />
      <use href="#cat_head_common" />
    </g>
    <use href="#cat_brow_male" opacity="0.85" />
  </g>
  <g id="male_baby" style="display:none">
    <g transform="translate(76 92) scale(0.92) translate(-76 -92)"><use href="#cat_body" /></g>
    <g transform="translate(0 112) scale(1 0.76) translate(0 -112)"><use href="#cat_legs" /></g>
    <use href="#cat_tail" opacity="0.85" />
    <g transform="translate(38 80) scale(1.18) translate(-38 -80)">
      <use href="#cat_neck" />
      <use href="#cat_head_common" />
    </g>
    <use href="#cat_brow_male" opacity="0.7" />
    <circle class="spot" cx="32" cy="102" r="3.4" opacity="0.2" />
  </g>

  <g id="female_adult" style="display:none">
    <use href="#cat_tail" />
    <use href="#cat_body" />
    <use href="#cat_legs" />
    <use href="#cat_neck" />
    <use href="#cat_head_common" />
    <use href="#cat_lash_female" />
  </g>
  <g id="female_young" style="display:none">
    <g transform="translate(76 88) scale(0.98) translate(-76 -88)"><use href="#cat_body" /></g>
    <g transform="translate(0 112) scale(1 0.93) translate(0 -112)"><use href="#cat_legs" /></g>
    <use href="#cat_tail" />
    <g transform="translate(38 80) scale(1.06) translate(-38 -80)">
      <use href="#cat_neck" />
      <use href="#cat_head_common" />
    </g>
    <use href="#cat_lash_female" />
  </g>
  <g id="female_child" style="display:none">
    <g transform="translate(76 90) scale(0.96) translate(-76 -90)"><use href="#cat_body" /></g>
    <g transform="translate(0 112) scale(1 0.86) translate(0 -112)"><use href="#cat_legs" /></g>
    <use href="#cat_tail" opacity="0.9" />
    <g transform="translate(38 80) scale(1.12) translate(-38 -80)">
      <use href="#cat_neck" />
      <use href="#cat_head_common" />
    </g>
    <use href="#cat_lash_female" />
  </g>
  <g id="female_baby" style="display:none">
    <g transform="translate(76 92) scale(0.92) translate(-76 -92)"><use href="#cat_body" /></g>
    <g transform="translate(0 112) scale(1 0.76) translate(0 -112)"><use href="#cat_legs" /></g>
    <use href="#cat_tail" opacity="0.85" />
    <g transform="translate(38 80) scale(1.18) translate(-38 -80)">
      <use href="#cat_neck" />
      <use href="#cat_head_common" />
    </g>
    <use href="#cat_lash_female" />
    <circle class="spot" cx="32" cy="102" r="3.4" opacity="0.2" />
  </g>
</svg>
